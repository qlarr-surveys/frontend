---
name: Feature request
description: Suggest a new feature or improvement
title: '[Feature] '
labels: 'enhancement'

body:
  - type: dropdown
    id: category
    attributes:
      label: Feature category
      options:
        - UI improvement
        - New question type
        - Survey logic
        - Performance
        - Accessibility
        - Other
    validations:
      required: true
  - type: textarea
    id: usecase
    attributes:
      label: Use case
      description: Describe the problem this feature would solve. Who would use it and why?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How should this feature work?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other ways you've considered solving this?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Any other relevant information, mockups, or references